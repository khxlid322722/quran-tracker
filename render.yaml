services:
  - type: web
    name: quran-tracker
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn quran_tracker.wsgi:application
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: DATABASE_URL
        fromDatabase:
          name: quran-tracker-db
          property: connectionString
    autoDeploy: true

databases:
  - name: quran-tracker-db
    plan: free
    databaseName: quran_tracker
    user: quran_tracker
