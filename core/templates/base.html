{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="color-scheme" content="light dark">
    <meta name="theme-color" content="#1f4d35">
    <meta name="description" content="Quran Tracker — log daily reading and track your class progress.">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Quran Tracker">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>{% block title %}Quran Tracker{% endblock %}</title>
    <link rel="manifest" href="{% url 'core:manifest' %}">
    <link rel="icon" href="{% static 'core/img/app-icon.png' %}" type="image/png">
    <link rel="apple-touch-icon" href="{% static 'core/img/app-icon.png' %}">
    <link rel="stylesheet" href="{% static 'core/css/main.css' %}">
</head>
<body class="{% block body_class %}{% endblock %}">
    {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <div class="message message-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        </div>
    {% endif %}

    {% block content %}{% endblock %}
</body>
</html>
