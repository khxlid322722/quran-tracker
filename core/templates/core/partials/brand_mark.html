{% load static %}
<div class="brand-mark{% if compact %} brand-mark-compact{% endif %}">
    <img src="{% static 'core/img/app-icon.png' %}" alt="Quran Tracker" class="brand-mark-icon" width="{% if compact %}44{% else %}64{% endif %}" height="{% if compact %}44{% else %}64{% endif %}">
    {% if not compact and show_title %}
        <div class="brand-mark-text">
            <p class="brand-mark-title">Quran Tracker</p>
        </div>
    {% endif %}
</div>
