{% load static %}
<div class="brand-mark{% if compact %} brand-mark-compact{% endif %}">
    <img src="{% static 'core/img/logo-mark.svg' %}" alt="" class="brand-mark-icon" width="{% if compact %}44{% else %}56{% endif %}" height="{% if compact %}44{% else %}56{% endif %}">
    {% if not compact %}
        <div class="brand-mark-text">
            <p class="brand-mark-title">Quran Tracker</p>
            {% if brand_subtitle %}
                <p class="brand-mark-subtitle">{{ brand_subtitle }}</p>
            {% endif %}
        </div>
    {% endif %}
</div>
