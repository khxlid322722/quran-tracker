<header class="dashboard-header">
    <div class="dashboard-header-main">
        {% if back_url %}
            <a href="{{ back_url }}" class="back-link">← Back</a>
        {% endif %}
        <div class="dashboard-title-row">
            {% include "core/partials/brand_mark.html" with brand_subtitle=role_label compact=True %}
            <div class="dashboard-title-copy">
                <h1>{{ page_title }}</h1>
                {% if subtitle %}
                    <p class="subtitle">{{ subtitle }}</p>
                {% endif %}
            </div>
        </div>
    </div>
    <form method="post" action="{% url 'core:logout' %}">
        {% csrf_token %}
        <button type="submit" class="btn btn-secondary">Sign out</button>
    </form>
</header>
